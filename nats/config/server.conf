// config/server.conf

# Порты
port: 4222
http_port: 8222

# JetStream глобальные настройки
jetstream {
    store_dir: "/data/jetstream"
    max_memory_store: 1GB
    max_file_store: 10GB
}

# Аккаунты — включаем из файла
accounts {
    include ./accounts/ms_xxx.conf
    include ./accounts/ms_payments.conf
}

# Логирование
debug: true
trace: true
logfile: "/var/log/nats/nats.log"
log_size_limit: 100MB
